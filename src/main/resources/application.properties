# ─── Base de datos MySQL ───────────────────────────────────────────────────────
# IMPORTANTE: Cambia estos valores por los de tu MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/sgel_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Bogota
spring.datasource.username=root
spring.datasource.password=tu_password_aqui
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# update: crea y actualiza tablas automáticamente (ideal para desarrollo)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ─── Spring Boot ──────────────────────────────────────────────────────────────
spring.application.name=SGEL
server.port=8080

# ─── Thymeleaf ────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
